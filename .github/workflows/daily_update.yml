name: Daily Maritime Data Update

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC = 09:00 Lebanon — morning run
    - cron: '0 17 * * 1-5'  # 17:00 UTC = 20:00 Lebanon — evening run
  workflow_dispatch:

jobs:
  update-maritime-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up GCP credentials
        run: printf '%s' '${{ secrets.GCP_KEY }}' > gcp_key.json

      - name: Fetch port weather and strait conditions
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          BQ_PROJECT:      ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:      ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_weather.py

      - name: Collect AIS vessel positions
        env:
          AISSTREAM_API_KEY:   ${{ secrets.AISSTREAM_API_KEY }}
          AIS_COLLECT_SECONDS: "240"
          BQ_PROJECT:          ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:          ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_ais.py

      - name: Fetch fuel prices from EIA API
        continue-on-error: true
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          BQ_PROJECT:  ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:  ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_fuel.py

      - name: Fetch shipping news
        continue-on-error: true
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          BQ_PROJECT:       ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:       ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_news.py

      - name: Build route analytics
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/build_route_analytics.py

      - name: Rebuild all analytical tables
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/update_combined.py

      - name: Cleanup credentials
        if: always()
        run: rm -f gcp_key.json
