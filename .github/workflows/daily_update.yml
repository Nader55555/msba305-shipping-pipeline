name: Daily Maritime Data Update

on:
  schedule:
    - cron: '0 20 * * 1-5'  # weekdays 20:00 UTC (after market close)
  workflow_dispatch:          # allow manual trigger from GitHub UI

# BDI is updated manually — see README for instructions.
# AIS, Weather and analytical tables run automatically daily.

jobs:
  update-maritime-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up GCP credentials
        run: printf '%s' '${{ secrets.GCP_KEY }}' > gcp_key.json

      # Step 1: Weather + straits — fetch from OpenWeatherMap
      - name: Fetch Port Weather and Strait Conditions, upload to BigQuery
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          BQ_PROJECT:      ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:      ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_weather.py

      # Step 2: AIS vessel tracking — 4-minute collection at 8 straits + 20 ports
      - name: Collect AIS vessel positions, upload to BigQuery
        env:
          AISSTREAM_API_KEY:    ${{ secrets.AISSTREAM_API_KEY }}
          AIS_COLLECT_SECONDS: "240"
          BQ_PROJECT:          ${{ secrets.BQ_PROJECT }}
          BQ_DATASET:          ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/ingest_ais.py

      # Step 3: Rebuild all 12 analytical tables from fresh data
      - name: Rebuild analytical tables and upload to BigQuery
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_key.json
        run: python scripts/update_combined.py

      - name: Cleanup credentials
        if: always()
        run: rm -f gcp_key.json
